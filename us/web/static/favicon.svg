<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- US flag favicon — Stars & Stripes for browser tab icon. -->
  <defs>
    <clipPath id="rounded">
      <rect width="64" height="64" rx="10"/>
    </clipPath>
  </defs>
  <g clip-path="url(#rounded)">
    <!-- White base -->
    <rect width="64" height="64" fill="#ffffff"/>
    <!-- 7 red stripes (between 6 white stripes = 13 total) -->
    <rect x="0" y="0"  width="64" height="5" fill="#B22234"/>
    <rect x="0" y="10" width="64" height="5" fill="#B22234"/>
    <rect x="0" y="20" width="64" height="5" fill="#B22234"/>
    <rect x="0" y="30" width="64" height="5" fill="#B22234"/>
    <rect x="0" y="40" width="64" height="5" fill="#B22234"/>
    <rect x="0" y="50" width="64" height="5" fill="#B22234"/>
    <rect x="0" y="60" width="64" height="4" fill="#B22234"/>
    <!-- Blue canton (top-left, covers ~7 stripes) -->
    <rect x="0" y="0" width="28" height="35" fill="#3C3B6E"/>
    <!-- Stars: 9 dots in 3×3 grid for tab legibility (real flag has 50) -->
    <g fill="#ffffff">
      <circle cx="6"  cy="7"  r="1.6"/>
      <circle cx="14" cy="7"  r="1.6"/>
      <circle cx="22" cy="7"  r="1.6"/>
      <circle cx="6"  cy="17" r="1.6"/>
      <circle cx="14" cy="17" r="1.6"/>
      <circle cx="22" cy="17" r="1.6"/>
      <circle cx="6"  cy="27" r="1.6"/>
      <circle cx="14" cy="27" r="1.6"/>
      <circle cx="22" cy="27" r="1.6"/>
    </g>
  </g>
</svg>
