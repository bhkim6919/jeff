<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q-TRON SURGE</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/surge.css">
</head>
<body>

    <!-- Header -->
    <header id="header">
        <div class="header-left">
            <h1 class="logo">Q-TRON <span class="logo-accent" style="color: var(--orange);">SURGE</span></h1>
            <span class="badge badge-mock">SIMULATOR</span>
        </div>
        <div class="header-right">
            <a href="/" class="nav-link">Dashboard</a>
            <a href="/lab" class="nav-link">Lab</a>
            <span id="clock" class="clock">--:--:--</span>
        </div>
    </header>

    <main id="main">

        <!-- Parameter Panel -->
        <section class="surge-section">
            <div class="section-title">
                <span>파라미터 설정</span>
                <button class="btn-sm" id="btn-reset" onclick="resetParams()">초기화</button>
            </div>
            <div class="surge-param-grid" id="param-grid">
                <!-- Filled by JS -->
            </div>
            <div class="surge-action-bar">
                <button class="btn-surge-start" id="btn-start" onclick="startSim()">시뮬레이션 시작</button>
                <button class="btn-surge-stop" id="btn-stop" onclick="stopSim()" style="display:none;">중지</button>
                <span class="surge-timer" id="timer">00:00</span>
                <span class="surge-tick-count" id="tick-count">0 ticks</span>
                <span class="surge-status" id="sim-status"></span>
            </div>
        </section>

        <!-- Live Dashboard (hidden until running) -->
        <div id="live-dashboard" style="display:none;">

            <!-- 3-Strategy Comparison Cards -->
            <div class="surge-grid-3" id="strategy-cards">
                <!-- Filled by JS: 3 strategy lane cards (A, B, C) -->
            </div>

            <!-- Candidates (shared) -->
            <section class="surge-section">
                <div class="section-title"><span>관찰 후보 (공유)</span></div>
                <div class="surge-scroll-sm">
                    <table class="surge-table">
                        <thead>
                            <tr><th>#</th><th>종목</th><th>가격</th><th>등락%</th><th>거래량급증</th><th>체결강도</th></tr>
                        </thead>
                        <tbody id="candidates-body">
                            <tr><td colspan="6" style="text-align:center;color:var(--text-dim);">스캔 대기</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Event Log -->
            <section class="surge-section">
                <div class="section-title"><span>이벤트 로그</span></div>
                <div class="surge-scroll-sm" id="event-log">
                    <div class="event-list" id="event-list"></div>
                </div>
            </section>

        </div>

    </main>

    <script src="/static/surge.js"></script>
</body>
</html>
