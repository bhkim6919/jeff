<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 64" role="img" aria-label="Q-TRON">
  <!--
    Q-TRON wordmark — logomark + brand name. Used in the shared nav
    strip header. The mark portion is identical to qtron-mark.svg
    (kept inline so a single asset request loads the wordmark).
  -->
  <defs>
    <linearGradient id="qtron-wg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7dd3fc"/>
      <stop offset="55%"  stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
  </defs>

  <!-- Logomark, scaled into the left 64×64 box -->
  <g transform="translate(0 0)">
    <circle cx="26" cy="30" r="18" fill="none" stroke="url(#qtron-wg)" stroke-width="6" stroke-linecap="round"/>
    <line x1="36" y1="42" x2="44" y2="50" stroke="url(#qtron-wg)" stroke-width="6" stroke-linecap="round"/>
    <line x1="38" y1="44" x2="58" y2="44" stroke="url(#qtron-wg)" stroke-width="3" stroke-linecap="round"/>
    <line x1="40" y1="50" x2="60" y2="50" stroke="url(#qtron-wg)" stroke-width="3" stroke-linecap="round"/>
    <line x1="42" y1="56" x2="56" y2="56" stroke="url(#qtron-wg)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="58" cy="44" r="2.4" fill="url(#qtron-wg)"/>
    <circle cx="60" cy="50" r="2.4" fill="url(#qtron-wg)"/>
    <circle cx="56" cy="56" r="2.4" fill="url(#qtron-wg)"/>
  </g>

  <!-- Wordmark "Q-TRON" -->
  <text x="74" y="42"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="28"
        font-weight="800"
        letter-spacing="2"
        fill="currentColor">Q-TRON</text>
</svg>
